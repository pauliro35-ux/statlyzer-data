<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATLYZER SH - Analytics Prototip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; }
        .tech-card { background: #161a22; border: 1px solid #30363d; box-shadow: 0 0 20px rgba(0, 119, 255, 0.1); }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen text-gray-200">

    <div class="w-full max-w-md text-center py-8 border-b-2 border-blue-600 mb-8">
        <h1 class="text-3xl font-extrabold tracking-widest text-blue-400">STATLYZER SH</h1>
        <p class="text-xs text-gray-500 mt-2 uppercase tracking-tighter">Advanced Sports Analytics Engine</p>
    </div>

    <div class="w-full max-w-md tech-card rounded-3xl p-8 mb-8">
        <label class="text-xs text-gray-400 font-bold ml-1 uppercase">Select Analytics Database</label>
        <select id="matchSelect" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 mt-2 mb-8 outline-none focus:border-blue-500 transition-all text-gray-400">
            <option value="">Searching for live data...</option>
        </select>

        <button onclick="runAnalysis()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all uppercase tracking-wider text-sm">
            Run Statistical Model
        </button>
    </div>

    <div id="results" class="w-full max-w-md tech-card rounded-3xl p-8 hidden animate-pulse">
        <div class="mb-6 pb-6 border-b border-gray-700">
            <span class="text-blue-400 font-bold block mb-2 text-sm uppercase">Mathematical Probability</span>
            <div class="flex justify-between items-center bg-gray-900 p-4 rounded-xl">
                <span id="matchName" class="text-white font-medium">-- vs --</span>
                <span class="text-3xl font-black text-blue-400">88%</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div class="p-5 bg-gray-900 rounded-xl border-l-4 border-green-500">
                <span class="text-[11px] text-green-400 font-bold block mb-1 uppercase tracking-tight">Set Piece Intensity</span>
                <span class="text-xl font-extrabold text-white">9.5+ Corners</span>
            </div>
            <div class="p-5 bg-gray-900 rounded-xl border-l-4 border-yellow-500">
                <span class="text-[11px] text-yellow-400 font-bold block mb-1 uppercase tracking-tight">Discipline Index</span>
                <span class="text-xl font-extrabold text-white">Strict (4-6)</span>
            </div>
        </div>
        
        <p class="text-[9px] text-gray-600 text-center uppercase mt-6 pt-6 border-t border-gray-700">Model: Poisson Distribution v2 | Data: SportAPI v7</p>
    </div>

    <script>
        // Simulare incarcare date din baza ta viitoare
        function runAnalysis() {
            document.getElementById('results').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
